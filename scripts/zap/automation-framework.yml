---
# ZAP Automation Framework Configuration for MCP Protocol
# Uses custom requester script to send proper JSON-RPC requests

env:
  contexts:
    - name: "aap-mcp-context"
      urls:
        - "http://localhost:3000"
      includePaths:
        - "http://localhost:3000/.*"
      excludePaths: []

  parameters:
    failOnError: true
    failOnWarning: false
    progressToStdout: true

jobs:
  # Store the MCP session ID as a global variable
  - type: script
    parameters:
      action: add
      type: standalone
      engine: "ECMAScript : Graal.js"
      name: set-mcp-session-id
      inline: |
        org.zaproxy.zap.extension.script.ScriptVars.setGlobalVar('mcpSessionId', 'MCP_SESSION_ID_PLACEHOLDER')

  - type: script
    parameters:
      action: run
      type: standalone
      name: set-mcp-session-id

  # Load the MCP requester script that makes proper JSON-RPC requests
  - type: script
    parameters:
      action: add
      type: standalone
      engine: "ECMAScript : Graal.js"
      name: mcp-requester
      file: /opt/rapidast/work/scripts/zap/mcp-requester.js

  # Run the MCP requester to send requests through ZAP
  - type: script
    parameters:
      action: run
      type: standalone
      name: mcp-requester

  # Passive scan the requests sent by mcp-requester
  - type: passiveScan-wait
    parameters:
      maxDuration: 60
