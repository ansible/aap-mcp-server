# RapiDAST Configuration for AAP MCP Server Security Scanning
# Based on Red Hat Product Security RapiDAST templates
# See: https://github.com/RedHatProductSecurity/rapidast

config:
  # Configuration schema version
  configVersion: 6

# Application being scanned
application:
  shortName: "aap-mcp-server"
  url: "http://localhost:3000"

# General scanning configuration
general:
  # Authentication configuration for MCP protocol
  authentication:
    type: "script_based"
    parameters:
      script_name: "mcp-authentication.js"
      script_engine: "ECMAScript : Graal.js"
      script_file: "/opt/rapidast/work/scripts/zap/mcp-authentication.js"
      Login URL: "http://localhost:3000/mcp"
    credentials:
      token: "test-token"

  # Session management for MCP
  session_management:
    script_name: "mcp-session-management.js"
    script_engine: "ECMAScript : Graal.js"
    script_file: "/opt/rapidast/work/scripts/zap/mcp-session-management.js"

# Scanner configurations
scanners:
  zap:
    # Import URLs from file for comprehensive API scanning
    importUrlsFromFile:
      fileName: "rapidast-urls.txt"

    # Passive scanner configuration
    passiveScan:
      # Disable rules that may cause false positives for our use case
      disabledRules: "2,10015,10024,10027,10054,10096,10109,10112"

    # Active scanner configuration
    activeScan:
      # Use minimal policy suitable for APIs
      policy: "API-scan-minimal"

    # Miscellaneous options
    miscOptions:
      # Add additional ZAP add-ons if needed
      additionalAddons: ""
