# sonar.projectKey and sonar.organization are set dynamically
# in .github/workflows/code_coverage.yml based on the repo owner and name

# TypeScript/JavaScript coverage configuration
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Define source and test directories
sonar.sources = src/
sonar.tests = src/,tests/

# Include test files in test scope
sonar.test.inclusions = **/*.test.ts,**/*.spec.ts,**/__tests__/**/*.ts

# Exclude test files, build artifacts, and large external schema files from source scope
sonar.exclusions = **/*.test.ts,**/*.spec.ts,**/__tests__/**/*,**/node_modules/**,**/dist/**,**/coverage/**,**/scripts/**,**/*.config.ts,**/*.config.js,data/**/*.json

# Quality gate configuration
sonar.qualitygate.wait=true
